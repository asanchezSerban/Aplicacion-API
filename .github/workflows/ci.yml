name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: AplicacionAPI/ClientManager.API

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: AplicacionAPI/ClientManager.API

      - name: Format check
        run: dotnet format --verify-no-changes
        working-directory: AplicacionAPI/ClientManager.API

  frontend:
    name: Frontend (Angular 21)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: AplicacionAPI/ClientManagerWeb/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: AplicacionAPI/ClientManagerWeb

      - name: Build
        run: npm run build -- --configuration production
        working-directory: AplicacionAPI/ClientManagerWeb
