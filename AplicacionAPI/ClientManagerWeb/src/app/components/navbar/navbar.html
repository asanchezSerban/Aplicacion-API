<mat-toolbar color="primary">
  <button mat-button (click)="navigateToCompanies()">
    <mat-icon>business</mat-icon>
    <span class="app-title">ClientManager</span>
  </button>

  <span class="spacer"></span>

  @if (authService.isLoggedIn() && authService.userRole() === 'SuperAdmin') {
    <button mat-button (click)="navigateToCompanies()">
      <mat-icon>domain</mat-icon>
      Empresas
    </button>
    <button mat-button (click)="navigateToUsers()">
      <mat-icon>people</mat-icon>
      Usuarios
    </button>
  }

  @if (authService.isLoggedIn()) {
    <span class="user-info" [matTooltip]="authService.userRole() ?? ''">
      <mat-icon>account_circle</mat-icon>
      {{ authService.userEmail() }}
    </span>

    <button mat-icon-button (click)="authService.logout()" matTooltip="Cerrar sesión">
      <mat-icon>logout</mat-icon>
    </button>
  }

  <mat-slide-toggle
    [checked]="isDarkMode"
    (change)="toggleDarkMode()"
    class="dark-toggle">
    <mat-icon>{{ isDarkMode ? 'dark_mode' : 'light_mode' }}</mat-icon>
  </mat-slide-toggle>
</mat-toolbar>
