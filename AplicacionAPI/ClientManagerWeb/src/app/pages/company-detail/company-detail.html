<div class="detail-container">
  @if (isLoading()) {
    <div class="spinner-container">
      <mat-spinner diameter="48"></mat-spinner>
    </div>
  }

  @if (company()) {
    <mat-card>
      <mat-card-content>
        <div class="detail-header">
          @if (company()!.logoUrl) {
            <img [src]="company()!.logoUrl" alt="Logo de {{ company()!.name }}" class="company-logo">
          }
          <div class="header-info">
            <h1>{{ company()!.name }}</h1>
          </div>
        </div>

        <div class="detail-section">
          <h3>Descripción</h3>
          <p>{{ company()!.description }}</p>
        </div>

        <div class="detail-dates">
          <div class="date-item">
            <span class="date-label">Creado</span>
            <span>{{ company()!.createdAt | date:'dd/MM/yyyy HH:mm' }}</span>
          </div>
          <div class="date-item">
            <span class="date-label">Actualizado</span>
            <span>{{ company()!.updatedAt | date:'dd/MM/yyyy HH:mm' }}</span>
          </div>
        </div>

        <div class="detail-actions">
          <button mat-button (click)="goBack()">
            <mat-icon>arrow_back</mat-icon>
            Volver
          </button>
          <button mat-raised-button color="primary" (click)="editCompany()">
            <mat-icon>edit</mat-icon>
            Editar
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  }
</div>
