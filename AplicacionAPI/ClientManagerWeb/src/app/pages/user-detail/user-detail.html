<div class="detail-container">
  @if (isLoading()) {
    <div class="spinner-container">
      <mat-spinner diameter="48"></mat-spinner>
    </div>
  }

  @if (user()) {
    <mat-card>
      <mat-card-content>
        <div class="detail-header">
          <mat-icon class="user-avatar">person</mat-icon>
          <div class="header-info">
            <h1>{{ user()!.name }}</h1>
            <span class="user-email">{{ user()!.email }}</span>
          </div>
        </div>

        <div class="detail-section">
          <h3>Empresa</h3>
          <p>{{ user()!.companyName }}</p>
        </div>

        <div class="detail-dates">
          <div class="date-item">
            <span class="date-label">Creado</span>
            <span>{{ user()!.createdAt | date:'dd/MM/yyyy HH:mm' }}</span>
          </div>
          <div class="date-item">
            <span class="date-label">Actualizado</span>
            <span>{{ user()!.updatedAt | date:'dd/MM/yyyy HH:mm' }}</span>
          </div>
        </div>

        <div class="detail-actions">
          <button mat-button (click)="goBack()">
            <mat-icon>arrow_back</mat-icon>
            Volver
          </button>
          <button mat-raised-button color="primary" (click)="editUser()">
            <mat-icon>edit</mat-icon>
            Editar
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  }
</div>
